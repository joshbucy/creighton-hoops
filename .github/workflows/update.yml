name: Update Basketball Data

on:
  schedule:
    # ── In-season: once daily at 8 AM Central ────────────────────────────────
    # Nov & Dec (CST = UTC-6, so 8 AM Central = 14:00 UTC)
    - cron: "0 14 * 11,12 *"
    # Jan, Feb, Mar (CST = UTC-6, so 8 AM Central = 14:00 UTC)
    - cron: "0 14 * 1,2,3 *"

    # ── Preseason: October 25 at 8 AM Central ─────────────────────────────────
    - cron: "0 14 25 10 *"

    # ── End of season: April 10 at 8 AM Central ───────────────────────────────
    - cron: "0 14 10 4 *"

  workflow_dispatch:  # manual trigger from the Actions tab anytime

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 anthropic

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scraper.py

      - name: Commit and push updated data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Auto-update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
